<!DOCTYPE html>
<html>
<head>
<title>Token Sender</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
</head>

<body>

<div class="container">

<h2>Bot / User Token Sender</h2>

<input id="token" placeholder="Token">
<input id="channel" placeholder="Channel ID">

<select id="type">
<option value="bot">Bot Token</option>
<option value="user">User Token</option>
</select>

<div id="editor">WEBCORD PORTAL | DEVELOPED BY SUBHAN (https://webcord.up.railway.app)</div>

<input id="amount" type="number" placeholder="Message Amount">
<input id="delay" type="number" placeholder="Delay seconds">

<button onclick="sendOnce()">Send 1 Message</button>
<button onclick="start()">Start Loop</button>
<button onclick="stop()">Stop Loop</button>

<div class="progress">
<div id="bar" class="progress-bar"></div>
</div>

</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script src="js/bot.js"></script>

</body>
</html>
