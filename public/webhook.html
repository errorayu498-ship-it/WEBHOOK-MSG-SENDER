
<!DOCTYPE html>
<html>
<head>

<title>Webhook Sender</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>

<body>

<div class="container">

<div class="title">Webhook Sender</div>

<div class="card">

<input id="url" placeholder="Webhook URL">

<div id="editor">WEBCORD PORTAL | DEVELOPED BY SUBHAN (https://webcord.up.railway.app)</div>

<input id="amount" type="number" placeholder="Message Amount">
<input id="delay" type="number" placeholder="Delay Seconds">

<button onclick="start()">Start Loop</button>
<button onclick="stop()">Stop Loop</button>

<div class="progress">
<div id="bar" class="progress-bar"></div>
</div>

</div>

</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script src="js/webhook.js"></script>

</body>
</html>
