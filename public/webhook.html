<!DOCTYPE html>
<html>
<head>
<title>Webhook Sender</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
</head>

<body>

<div class="container">

<h2>Webhook Sender</h2>

<input id="webhook" placeholder="Webhook URL">

<div id="editor"></div>

<input id="amount" type="number" placeholder="Message Amount">
<input id="delay" type="number" placeholder="Delay seconds">

<button onclick="sendOnce()">Send Once</button>
<button onclick="start()">Start</button>
<button onclick="stop()">Stop</button>

<div class="progress">
<div id="bar" class="progress-bar"></div>
</div>

</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script src="js/webhook.js"></script>

</body>
</html>
