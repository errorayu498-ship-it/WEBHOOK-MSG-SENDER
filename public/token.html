
<!DOCTYPE html>
<html>
<head>

<title>Token Sender</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>

<body>

<div class="container">

<div class="title">Token Sender</div>

<div class="card">

<textarea id="tokens" placeholder="Single or bulk tokens (one per line)"></textarea>

<input id="channel" placeholder="Channel ID">

<select id="type">
<option value="bot">Bot Token</option>
<option value="user">User Token</option>
</select>

<div id="editor"></div>

<input id="amount" type="number" placeholder="Message Amount">
<input id="delay" type="number" placeholder="Delay Seconds">

<button onclick="start()">Start</button>
<button onclick="stop()">Stop</button>

<div class="progress">
<div id="bar" class="progress-bar"></div>
</div>

</div>

</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script src="js/token.js"></script>

</body>
</html>
